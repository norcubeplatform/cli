# GoReleaser config for the Norcube CLI.
# https://goreleaser.com/customization/
#
# Triggered by `git push --tags` from .github/workflows/release.yaml.
# Releases go to https://github.com/norcubeplatform/cli/releases.

version: 2
project_name: norcube

before:
  hooks:
    - go mod tidy

builds:
  - id: norcube
    main: ./cmd/norcube
    binary: norcube
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X github.com/norcubeplatform/cli/internal/buildinfo.Version={{.Version}}
      - -X github.com/norcubeplatform/cli/internal/buildinfo.Commit={{.ShortCommit}}
      - -X github.com/norcubeplatform/cli/internal/buildinfo.Date={{.Date}}
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      # Windows on arm64 is rare enough to skip until someone asks.
      - goos: windows
        goarch: arm64

archives:
  - id: norcube
    # Names align with what install.sh expects:
    #   norcube_<os>_<arch>.tar.gz   (or .zip on Windows)
    name_template: "norcube_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE*

checksum:
  # GoReleaser emits a single checksums.txt with SHA-256 for every archive.
  # `norcube upgrade` verifies against this file before swapping binaries.
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  # Used when running `goreleaser release --snapshot` for testing — bumps
  # patch and appends -next so it doesn't collide with a real tag.
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

release:
  github:
    owner: norcubeplatform
    name: cli
  draft: false
  prerelease: auto
